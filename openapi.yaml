openapi: 3.0.0
info:
  title: Orders API
  description: Order lifecycle management for the ACME platform — creation, fulfillment, tracking, and cancellation.
  version: 2.1.0
servers:
  - url: https://orders.acme-platform.internal/v2
    description: Production
  - url: https://orders-dev.acme-platform.internal/v2
    description: Development
security:
  - bearerAuth: []
tags:
  - name: orders
  - name: fulfillment
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /orders:
    get:
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, shipped, delivered, cancelled]
        - name: customerId
          in: query
          schema: {type: string}
        - name: page
          in: query
          schema: {type: integer, default: 1}
      responses:
        '200':
          description: Paginated list of orders
    post:
      tags: [orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/OrderInput'}
      responses:
        '201':
          description: Order created
  /orders/{orderId}:
    get:
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Order details
        '404':
          description: Order not found
    patch:
      tags: [orders]
      summary: Update order
      parameters:
        - name: orderId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object}
      responses:
        '200':
          description: Order updated
  /orders/{orderId}/cancel:
    post:
      tags: [orders]
      summary: Cancel order
      parameters:
        - name: orderId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Order cancelled
        '409':
          description: Order cannot be cancelled
  /orders/{orderId}/items:
    get:
      tags: [orders]
      summary: Get order line items
      parameters:
        - name: orderId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Order items
  /orders/track/{trackingId}:
    get:
      tags: [fulfillment]
      summary: Track shipment
      parameters:
        - name: trackingId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Tracking details
        '404':
          description: Tracking ID not found
  /orders/{orderId}/fulfill:
    post:
      tags: [fulfillment]
      summary: Mark order fulfilled
      parameters:
        - name: orderId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trackingId: {type: string}
                carrier: {type: string}
      responses:
        '200':
          description: Fulfillment recorded
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    OrderInput:
      type: object
      required: [customerId, items]
      properties:
        customerId: {type: string}
        items:
          type: array
          items:
            type: object
            properties:
              itemId: {type: string}
              quantity: {type: integer}
        shippingAddress: {type: object}
